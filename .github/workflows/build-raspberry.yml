name: Build Raspberry Pi

on:
  push:
    tags:
      - 'v*-raspberry'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.10.0)'
        required: false
        default: ''

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: raspberry
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install ARM64 cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      
      - name: Build for ARM64
        run: npm run build:pi
        env:
          USE_SYSTEM_FPM: true
      
      - name: List build artifacts
        run: ls -la dist/
      
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: seedisplay-arm64-deb
          path: dist/**/*.deb
          retention-days: 30
      
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: seedisplay-arm64-appimage
          path: dist/**/*.AppImage
          retention-days: 30
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/**/*.deb
            dist/**/*.AppImage
          draft: false
          prerelease: true
          name: ${{ github.ref_name }} - Raspberry Pi
          body: |
            ## 🍓 SEE Display pour Raspberry Pi
            
            ### Installation
            
            **Option 1 - Package .deb (recommandé)**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/seedisplay-*-arm64.deb
            sudo dpkg -i seedisplay-*-arm64.deb
            sudo apt-get install -f  # Si dépendances manquantes
            ```
            
            **Option 2 - AppImage**
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/SEE-Display-*-arm64.AppImage
            chmod +x SEE-Display-*-arm64.AppImage
            ./SEE-Display-*-arm64.AppImage
            ```
            
            ### Configuration
            Créer `/opt/seedisplay/data/configSEE.json` avec vos identifiants SOEK.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
