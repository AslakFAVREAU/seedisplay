    // Gestion de l'écran de chargement
    function hideLoadingScreen() {
      const loadingScreen = document.getElementById('loadingScreen');
      if (loadingScreen) {
        loadingScreen.classList.add('hidden');
        setTimeout(() => {
          loadingScreen.style.display = 'none';
        }, 500); // Attendre la fin de la transition
      }
    }

    function showLoadingScreen(message = 'Chargement...') {
      const loadingScreen = document.getElementById('loadingScreen');
      if (loadingScreen) {
        loadingScreen.style.display = 'flex';
        loadingScreen.classList.remove('hidden');
        const messageDiv = loadingScreen.querySelector('div > div:first-child');
        if (messageDiv) messageDiv.textContent = message;
      }
    }

    // Amélioration de la gestion des transitions entre médias
    function smoothTransition(fromElementId, toElementId, callback) {
      const fromEl = document.getElementById(fromElementId);
      const toEl = document.getElementById(toElementId);
      
      if (fromEl) fromEl.style.opacity = '0';
      
      setTimeout(() => {
        if (fromEl) fromEl.style.display = 'none';
        if (toEl) {
          toEl.style.display = 'block';
          toEl.style.opacity = '1';
        }
        if (callback) callback();
      }, 300);
    }

    // Small runtime logger visible on the page to capture renderer logs when DevTools isn't available
    (function(){
      try{
        const debugEl = document.getElementById('debugLog')
        const esc = (s)=> String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        function append(level, args){
          try{
            const msg = Array.from(args).map(a => (typeof a === 'object' ? JSON.stringify(a) : String(a))).join(' ')
            const line = document.createElement('div')
            line.style.marginBottom = '4px'
            line.innerHTML = `<span style="color: #9ad0ff">[${level}]</span> ${esc(msg)}`
            debugEl.appendChild(line)
            debugEl.style.display = 'block'
            // keep last 100 lines
            while(debugEl.childNodes.length>100) debugEl.removeChild(debugEl.firstChild)
          }catch(e){/*ignore*/}
        }
    const _log = console.log.bind(console)
  const _warn = console.warn.bind(console)
  const _err = console.error.bind(console)
    // local helper
    const __log = (level, tag, ...args) => { try { if (typeof window !== 'undefined' && window.logger) return window.logger[level](tag, ...args); if (console && console[level]) return console[level](tag, ...args); return _log.apply(console, args) } catch(e){ try{ _log.apply(console,args) }catch(_){} } }
        // If preload exposes a structured logger, route logs through it so they
        // appear in main with a consistent format. Fallback to original behaviour.
  if (typeof window !== 'undefined' && window.logger) {
          // Only call logger methods when they exist to avoid TypeErrors
          const safeInfo = (tag, ...rest) => { if (window.logger && typeof window.logger.info === 'function') { try { window.logger.info(tag, ...rest) } catch(e) { _log.apply(console, arguments) } } }
          const safeWarn = (tag, ...rest) => { if (window.logger && typeof window.logger.warn === 'function') { try { window.logger.warn(tag, ...rest) } catch(e) { _warn.apply(console, arguments) } } }
          const safeError = (tag, ...rest) => { if (window.logger && typeof window.logger.error === 'function') { try { window.logger.error(tag, ...rest) } catch(e) { _err.apply(console, arguments) } } }
          console.log = function(tagOrMsg){
            if (arguments.length > 1) {
              const tag = arguments[0]
              const rest = Array.prototype.slice.call(arguments,1)
              safeInfo(tag, ...rest)
            } else {
              safeInfo('renderer', arguments[0])
            }
            append('LOG', arguments); _log.apply(console, arguments)
          }
          console.warn = function(tagOrMsg){
            if (arguments.length > 1) {
              const tag = arguments[0]
              const rest = Array.prototype.slice.call(arguments,1)
              safeWarn(tag, ...rest)
            } else {
              safeWarn('renderer', arguments[0])
            }
            append('WARN', arguments); _warn.apply(console, arguments)
          }
          console.error = function(tagOrMsg){
            if (arguments.length > 1) {
              const tag = arguments[0]
              const rest = Array.prototype.slice.call(arguments,1)
              safeError(tag, ...rest)
            } else {
              safeError('renderer', arguments[0])
            }
            append('ERROR', arguments); _err.apply(console, arguments)
          }
        } else {
          console.log = function(){ append('LOG', arguments); _log.apply(console, arguments) }
          console.warn = function(){ append('WARN', arguments); _warn.apply(console, arguments) }
          console.error = function(){ append('ERROR', arguments); _err.apply(console, arguments) }
        }
        window.addEventListener('error', function(ev){ append('ERROR', [ev.message, ev.filename+':'+ev.lineno]); })
        window.addEventListener('unhandledrejection', function(ev){ append('ERROR', ['UnhandledRejection', ev.reason]) })
      }catch(e){/*ignore*/}
    })();

  let configLoaded = false;

      __log('info','bootstrap','All initialization complete, hiding loading screen')

    }

  // Récupération asynchrone de la configuration (préférer config sur disque ou variables d'environnement)
  window.api.getConfig().then((config) => {
    __log('info','bootstrap','api.getConfig returned', config)
    // Apply config values to globals expected by the legacy code
    try {
      // Expose la config au code legacy qui s'attend à trouver window.configSEE
      window.configSEE = config
      // Appeler la fonction legacy pour appliquer la configuration et déclencher les flux (diapo / meteo)
      if (typeof getConfigSEE === 'function') {
        __log('info','bootstrap','calling legacy getConfigSEE()')
        getConfigSEE()
        configLoaded = true;
        checkLoadingComplete();
      } else {
        __log('warn','bootstrap','legacy getConfigSEE not present')
        configLoaded = true;
        checkLoadingComplete();
      }
    } catch (e) {
      __log('error','bootstrap','Error applying config to legacy flow', e)
      configLoaded = true;
      checkLoadingComplete();
    }
  }).catch((err) => {
    __log('error','bootstrap','window.api.getConfig failed', err)
    configLoaded = true;
    checkLoadingComplete();
  })

    /*
    Fonction pour téléharger les img sur le ecran
    */
    async function download(nomMedia) {
      urlMedia = "https://soek.fr/uploads/see/media/" + nomMedia
      if (window && window.api && typeof window.api.fetchJson === 'function') {
        try {
          // fetchJson returns parsed JSON; for binary download we would add another API. Keep a simple fetch via renderer if allowed.
          __log('info','download','using preload.fetchJson for ' + urlMedia)
          const data = await window.api.fetchJson(urlMedia)
          // Not ideal for binary media; this is a placeholder for now
          __log('debug','download','received data length ' + JSON.stringify(data).length)
  } catch (e) { __log('error','download','download via preload failed', e) }
      } else if (typeof fetch === 'function') {
        const response = await fetch(urlMedia);
        const buffer = await response.arrayBuffer();
        // Attempt to write via a preload writeFile if available
        if (window && window.api && typeof window.api.writeFile === 'function') {
          const uint8 = new Uint8Array(buffer)
            try {
            window.api.writeFile('media/' + nomMedia, Buffer.from(uint8).toString('binary'))
            __log('info','download','finished downloading via api.writeFile ' + nomMedia)
          } catch (e) { __log('error','download','api.writeFile failed', e) }
        } else {
                            __log('warn','download','no api.writeFile available to save downloaded media')
        }
      } else {
  __log('warn','download','no fetch or preload.fetchJson available')
      }
    }
