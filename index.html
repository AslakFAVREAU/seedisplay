  <script>
    // Phase 2 Week 1: Initialize DisplayState (replaces imgShow, imgLoad, player)
    window.displayState = new DisplayState();
    
    // Phase 2 Week 2: Initialize ErrorHandler and ApiManager (resilience layer)
    window.errorHandler = new ErrorHandler({
      maxRetries: 3,
      retryDelay: 1000,
      failureThreshold: 5,
      recoveryTimeout: 30000,
      logger: window.logger || console
    });
    
    // Initialize ApiManager with ErrorHandler
    if (window.apiManager) {
      window.apiManager.init(window.errorHandler);
    }
    
    // Initialize ApiCache for offline mode
    window.apiCache = new ApiCache({
      maxAge: 24 * 60 * 60 * 1000, // 24 hours
      logger: window.logger || console
    });
    window.apiCache.cleanup(); // Clean old entries on startup
    
    // Backward compatibility: Map old global variables to DisplayState
    // This allows gradual migration of loopDiapo.js
    Object.defineProperty(window, 'imgShow', {
      get: () => window.displayState.activePlayer,
      set: (val) => {
        if (val !== window.displayState.activePlayer) {
          window.displayState.togglePlayer();
        }
      }
    });
    
    Object.defineProperty(window, 'imgLoad', {
      get: () => window.displayState.getInactivePlayer(),
      set: () => {} // Read-only in new pattern
    });
    
    Object.defineProperty(window, 'player', {
      get: () => window.displayState.activePlayer,
      set: (val) => {
        if (val !== window.displayState.activePlayer) {
          window.displayState.togglePlayer();
        }
      }
    });
  </script>

    // Gestion de l'écran de chargement
    function hideLoadingScreen() {
      const loadingScreen = document.getElementById('loadingScreen');
      if (loadingScreen) {
        loadingScreen.classList.add('hidden');
        setTimeout(() => {
          loadingScreen.style.display = 'none';
        }, 500); // Attendre la fin de la transition
      }
    }

    function showLoadingScreen(message = 'Chargement...') {
      const loadingScreen = document.getElementById('loadingScreen');
      if (loadingScreen) {
        loadingScreen.style.display = 'flex';
        loadingScreen.classList.remove('hidden');
        const messageDiv = loadingScreen.querySelector('div > div:first-child');
        if (messageDiv) messageDiv.textContent = message;
      }
    }

    // Amélioration de la gestion des transitions entre médias
    function smoothTransition(fromElementId, toElementId, callback) {
      const fromEl = document.getElementById(fromElementId);
      const toEl = document.getElementById(toElementId);
      
      if (fromEl) fromEl.style.opacity = '0';
      
      setTimeout(() => {
        if (fromEl) fromEl.style.display = 'none';
        if (toEl) {
          toEl.style.display = 'block';
          toEl.style.opacity = '1';
        }
        if (callback) callback();
      }, 300);
    }

    // Small runtime logger visible on the page to capture renderer logs when DevTools isn't available
    (function(){

        const debugEl = document.getElementById('debugLog')
        const esc = (s)=> String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        function append(level, args){
          try{
            const msg = Array.from(args).map(a => (typeof a === 'object' ? JSON.stringify(a) : String(a))).join(' ')
            const line = document.createElement('div')
            line.style.marginBottom = '4px'
            line.innerHTML = `<span style="color: #9ad0ff">[${level}]</span> ${esc(msg)}`
            debugEl.appendChild(line)
            debugEl.style.display = 'block'
            // keep last 100 lines
            while(debugEl.childNodes.length>100) debugEl.removeChild(debugEl.firstChild)
          }catch(e){/*ignore*/}
        }

  async function submitSetup() {
    const ecranUuid = document.getElementById('setupEcranUuid').value.trim()
    const env = document.getElementById('setupEnv').value
    const apiToken = document.getElementById('setupApiToken').value.trim()
    const errorDiv = document.getElementById('setupError')
    const statusDiv = document.getElementById('setupStatus')
    const submitBtn = document.getElementById('setupSubmit')

    // Validation UUID (format basique)
    const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i
    if (!ecranUuid || !uuidRegex.test(ecranUuid)) {
      errorDiv.textContent = '⚠️ Veuillez entrer un UUID valide (format: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)'
      return
    }

    errorDiv.textContent = ''
    statusDiv.textContent = '🔄 Vérification de la connexion au serveur...'
    submitBtn.disabled = true

    try {
      // Construire l'URL de test selon l'environnement
      const baseUrl = env === 'local' 
        ? 'http://localhost:8000' 
        : 'https://soek.fr'
      const testUrl = `${baseUrl}/see/API/diapo/${ecranUuid}`
      
      __log('info','setup','Testing API connection:', testUrl)
      statusDiv.textContent = '🔄 Connexion à ' + baseUrl + '...'

      // Tester la connexion à l'API
      const fetchHeaders = { 'Accept': 'application/json' }
      if (apiToken) {
        fetchHeaders['X-API-Token'] = apiToken
      }
      const response = await fetch(testUrl, { 
        method: 'GET',
        headers: fetchHeaders,
        signal: AbortSignal.timeout(10000) // 10s timeout
      })

      if (!response.ok) {
        throw new Error(`Erreur HTTP ${response.status}`)
      }

      const data = await response.json()
      
      if (!data.ecranId) {
        throw new Error('Réponse invalide: ecranId manquant')
      }

      __log('info','setup','API test successful, ecranNom:', data.ecranNom)
      statusDiv.textContent = `✅ Écran trouvé: "${data.ecranNom}"`

      // Sauvegarder la configuration
      const newConfig = {
        ecranUuid: ecranUuid,
        env: env,
        apiToken: apiToken || '', // Token API optionnel
        // Valeurs par défaut (seront écrasées par l'API)
        meteo: true,
        meteoLat: 48.8566,
        meteoLon: 2.3522,
        meteoUnits: 'metric',
        logoSOE: true,
        weekNo: true,
        weekType: false,
        weekDisplay: true
      }

      // Sauvegarder via preload API
      if (window.api && typeof window.api.writeFile === 'function') {
        await window.api.writeFile('configSEE.json', JSON.stringify(newConfig, null, 2))
        __log('info','setup','Config saved successfully')
      } else {
        throw new Error('API writeFile non disponible')

      statusDiv.textContent = '✅ Configuration sauvegardée! Redémarrage...'
      
      // Attendre un peu puis recharger
      setTimeout(() => {
        window.location.reload()

    } catch (err) {

      errorDiv.textContent = `❌ Erreur: ${err.message}`
      statusDiv.textContent = ''
      submitBtn.disabled = false
    }
  }
